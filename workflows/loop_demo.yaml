name: loop_demo
group: Demo
invocation:
  allow_http: true
  allow_schedule: false

example_payloads:
  - name: multi-person
    payload:
      xml: |
        <items>
          <item>Alice</item>
          <item>Bob</item>
          <item>Charlie</item>
        </items>
  - name: single-item
    payload:
      xml: |
        <items>
          <item>Eve</item>
        </items>

steps:
  - id: to_json
    type: xml2json
    input_from: initial

  - id: extract_items
    type: context_extract_json
    variable: items_json
    input_from: to_json
    json_path: /items/item

  - id: init_empty
    type: context_set
    variable: empty_obj
    value: "{}"

  - id: greet_all
    type: for_each
    input_from: "var:items_json"
    items_path: /
    as: person
    index_as: idx
    steps:
      - id: make_ctx
        type: json_set
        input_from: "var:empty_obj"
        json_path: /name
        value_from: "var:person"
      - id: if_bob
        type: if
        condition:
          context_key: person
          equals: Bob
        then:
          - id: congratulate_bob
            type: liquid
            input_from: make_ctx
            template: "Gefeliciteerd, {{ name }}!"
          - id: extra_true_stap
            type: liquid
            input_from: make_ctx
            template: "Dit is een extra TRUE-stap voor {{ name }}."
        else:
          - id: greet_others
            type: liquid
            input_from: make_ctx
            template: "Hello, {{ name }}!"
          - id: extra_false_stap
            type: liquid
            input_from: make_ctx
            template: "Dit is een extra FALSE-stap voor {{ name }}."

  - id: set_greetings
    type: json_set
    input_from: "var:empty_obj"
    json_path: /greetings
    value_from: greet_all

  - id: combine
    type: liquid
    input_from: set_greetings
    template: "Greetings: {% for g in greetings %}{{ g }}{% unless forloop.last %}, {% endunless %}{% endfor %}"
