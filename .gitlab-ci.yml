# MiniCloud: bouw alle service-images en push naar de GitLab Container Registry.
# Vereist: in het GitLab-project onder Settings → General → Visibility → Container Registry aan.
# Standaard CI-variabelen CI_REGISTRY, CI_REGISTRY_IMAGE, CI_REGISTRY_USER, CI_REGISTRY_PASSWORD
# worden door GitLab gezet zodra de registry gebruikt wordt.

stages:
  - build

variables:
  # Executor-image (Kaniko); pin voor voorspelbare builds
  KANIKO_IMAGE: gcr.io/kaniko-project/executor:v1.23.2-debug

# Template: één microservice uit services/<naam>/
.build-kaniko:
  stage: build
  image:
    name: $KANIKO_IMAGE
    entrypoint: [""]
  before_script:
    - mkdir -p /kaniko/.docker
    - |
      echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" \
        > /kaniko/.docker/config.json
  script:
    - |
      set -eux
      CTX="${CI_PROJECT_DIR}/services/${SERVICE}"
      DF="${CTX}/Dockerfile"
      test -f "$DF"
      /kaniko/executor \
        --context "$CTX" \
        --dockerfile "$DF" \
        --destination "${CI_REGISTRY_IMAGE}/${SERVICE}:${CI_COMMIT_SHORT_SHA}" \
        --destination "${CI_REGISTRY_IMAGE}/${SERVICE}:latest"
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

gateway:
  extends: .build-kaniko
  variables:
    SERVICE: gateway

xslt:
  extends: .build-kaniko
  variables:
    SERVICE: xslt

httpcall:
  extends: .build-kaniko
  variables:
    SERVICE: httpcall

orchestrator:
  extends: .build-kaniko
  variables:
    SERVICE: orchestrator
