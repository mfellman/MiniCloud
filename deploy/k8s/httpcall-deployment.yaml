apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpcall
  labels:
    app.kubernetes.io/name: minicloud
    app.kubernetes.io/component: httpcall
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: httpcall
  template:
    metadata:
      labels:
        app.kubernetes.io/name: httpcall
        app.kubernetes.io/component: httpcall
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 10001
      containers:
        - name: httpcall
          image: minicloud/httpcall:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
