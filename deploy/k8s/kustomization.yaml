# kubectl apply -k deploy/k8s
# Images: minicloud/gateway, transformers, egress-http/ftp/ssh, orchestrator (see local-kind.sh)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: minicloud-workflows
    files:
      - workflows/demo.yaml
      - workflows/loop_demo.yaml
      - workflows/minimal.yaml
      - workflows/schedule_only_demo.yaml
      - workflows/transform_demo.yaml
  - name: minicloud-connections
    files:
      - connections/example_http.yaml
resources:
  - configmap-templates.yaml
  - egress-http-deployment.yaml
  - egress-http-service.yaml
  - egress-ftp-deployment.yaml
  - egress-ftp-service.yaml
  - egress-ssh-deployment.yaml
  - egress-ssh-service.yaml
  - transformers-deployment.yaml
  - transformers-service.yaml
  - orchestrator-deployment.yaml
  - orchestrator-service.yaml
  - gateway-deployment.yaml
  - gateway-service.yaml
  - dashboard-deployment.yaml
  - dashboard-service.yaml
  - ingress.yaml
