apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  labels:
    app.kubernetes.io/name: minicloud
    app.kubernetes.io/component: orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orchestrator
        app.kubernetes.io/component: orchestrator
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 10001
      containers:
        - name: orchestrator
          image: minicloud/orchestrator:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: XSLT_URL
              value: http://xslt:8080
            - name: XSLT_APPLY_PATH
              value: /apply
            - name: HTTP_CALL_URL
              value: http://httpcall:8080
            - name: HTTP_CALL_PATH
              value: /call
            - name: WORKFLOWS_DIR
              value: /app/workflows
            # Optioneel: Bearer-token voor POST /invoke/scheduled (CronJob / interne caller)
            # - name: SCHEDULE_INVOCATION_TOKEN
            #   valueFrom:
            #     secretKeyRef:
            #       name: minicloud-schedule-token
            #       key: token
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: workflows
              mountPath: /app/workflows
              readOnly: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 512Mi
      volumes:
        - name: workflows
          configMap:
            name: minicloud-workflows
