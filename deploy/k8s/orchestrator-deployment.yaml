apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  labels:
    app.kubernetes.io/name: minicloud
    app.kubernetes.io/component: orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orchestrator
        app.kubernetes.io/component: orchestrator
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: orchestrator
          image: minicloud/orchestrator:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: TRANSFORMERS_URL
              value: http://transformers:8080
            - name: EGRESS_HTTP_URL
              value: http://egress-http:8080
            - name: EGRESS_HTTP_PATH
              value: /call
            - name: EGRESS_FTP_URL
              value: http://egress-ftp:8080
            - name: EGRESS_SSH_URL
              value: http://egress-ssh:8080
            - name: EGRESS_RABBITMQ_URL
              value: http://egress-rabbitmq:8080
            - name: STORAGE_SERVICE_URL
              value: http://storage:8080
            - name: WORKFLOWS_DIR
              value: /app/workflows
            - name: CONNECTIONS_DIR
              value: /app/connections
            # Trace opslag (persistent workflow run history)
            - name: TRACES_DIR
              value: /app/traces
            - name: TRACES_MAX_RUNS
              value: "200"
            # Optioneel: Bearer voor POST /run en POST /run/{name} (HTTP / gateway /v1/run)
            # - name: HTTP_INVOCATION_TOKEN
            #   valueFrom:
            #     secretKeyRef:
            #       name: minicloud-http-invoke-token
            #       key: token
            # Optioneel: Bearer voor POST /invoke/scheduled (CronJob / interne caller)
            # - name: SCHEDULE_INVOCATION_TOKEN
            #   valueFrom:
            #     secretKeyRef:
            #       name: minicloud-schedule-token
            #       key: token
            # OAuth2 resource server (JWT + scopes); zie docs/oauth-authorization.md
            # - name: OAUTH2_ENABLED
            #   value: "true"
            # - name: OAUTH2_JWKS_URI
            #   value: "https://idp.example.com/realms/yourrealm/protocol/openid-connect/certs"
            # - name: OAUTH2_ISSUER
            #   value: "https://idp.example.com/realms/yourrealm"
            # - name: OAUTH2_AUDIENCE
            #   value: "minicloud-orchestrator"
            # RabbitMQ trigger (topic pub/sub). Message body is workflow input payload.
            # Workflow selection: header Workflow, or Domain/Service/Action/Version.
            - name: RABBITMQ_TRIGGER_ENABLED
              value: "true"
            - name: RABBITMQ_TRIGGER_URL
              value: "amqp://guest:guest@rabbitmq:5672/"
            - name: RABBITMQ_TRIGGER_EXCHANGE
              value: "minicloud.events"
            - name: RABBITMQ_TRIGGER_EXCHANGE_TYPE
              value: "topic"
            - name: RABBITMQ_TRIGGER_QUEUE
              value: "orchestrator-rabbitmq-trigger"
            - name: RABBITMQ_TRIGGER_BINDING_KEY
              value: "storage.kv.updated.#"
            # Dedicated route for storage change events:
              - name: OAUTH2_ENABLED
                value: "true"
              - name: OAUTH2_JWT_SHARED_SECRET
                value: "change-me-minicloud-identity"
              - name: OAUTH2_ISSUER
                value: "minicloud-identity"
              - name: OAUTH2_AUDIENCE
                value: "minicloud"
            - name: RABBITMQ_TRIGGER_STORAGE_CHANGED_WORKFLOW
              value: "storage.kv.updated.1"
            - name: RABBITMQ_TRIGGER_STORAGE_BUCKET_ALLOW
              value: "*"
            - name: RABBITMQ_TRIGGER_STORAGE_KEY_ALLOW
              value: "*"
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: workflows
              mountPath: /app/workflows
              readOnly: true
            - name: connections
              mountPath: /app/connections
              readOnly: true
            - name: traces
              mountPath: /app/traces
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 512Mi
      volumes:
        - name: workflows
          configMap:
            name: minicloud-workflows
        - name: connections
          configMap:
            name: minicloud-connections
        - name: traces
          emptyDir: {}
