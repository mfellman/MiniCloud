name: storage_demo
group: Storage
invocation:
  allow_http: true
  allow_schedule: true
steps:
  - id: write_payload
    type: storage_write
    storage:
      bucket: demo
      key: payloads/last
      value_from: initial
  - id: read_payload
    type: storage_read
    storage:
      bucket: demo
      key: payloads/last
      output_field: value
