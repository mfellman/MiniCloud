apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app.kubernetes.io/name: minicloud
    app.kubernetes.io/component: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway
        app.kubernetes.io/component: gateway
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 10001
      containers:
        - name: gateway
          image: minicloud/gateway:latest
          imagePullPolicy: IfNotPresent
          env:
            # Only POST /v1/run and /v1/run/{name} are usable from outside; /v1/transform and /v1/status return 404.
            - name: GATEWAY_ORCHESTRATION_ONLY
              value: "true"
            - name: ORCHESTRATOR_URL
              value: http://orchestrator:8080
            - name: ORCHESTRATOR_RUN_PATH
              value: /run
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
