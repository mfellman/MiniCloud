# Optional: requires an Ingress controller (nginx, traefik, ...).
# Adjust host or class for your cluster. Without Ingress: kubectl port-forward svc/gateway 8080:8080
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway
  labels:
    app.kubernetes.io/name: minicloud
    app.kubernetes.io/component: gateway-ingress
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8080
          - path: /dashboard
            pathType: Prefix
            backend:
              service:
                name: dashboard
                port:
                  number: 8080
