apiVersion: apps/v1
kind: Deployment
metadata:
  name: transformers
  labels:
    app.kubernetes.io/name: minicloud
    app.kubernetes.io/component: transformers
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: transformers
  template:
    metadata:
      labels:
        app.kubernetes.io/name: transformers
        app.kubernetes.io/component: transformers
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: transformers
          image: minicloud/transformers:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              memory: 512Mi
