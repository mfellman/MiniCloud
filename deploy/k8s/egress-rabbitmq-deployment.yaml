apiVersion: apps/v1
kind: Deployment
metadata:
  name: egress-rabbitmq
  labels:
    app.kubernetes.io/name: minicloud
    app.kubernetes.io/component: egress-rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: egress-rabbitmq
  template:
    metadata:
      labels:
        app.kubernetes.io/name: egress-rabbitmq
        app.kubernetes.io/component: egress-rabbitmq
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: egress-rabbitmq
          image: minicloud/egress-rabbitmq:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672/
            - name: RABBITMQ_EXCHANGE
              value: minicloud.events
            - name: RABBITMQ_EXCHANGE_TYPE
              value: topic
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
