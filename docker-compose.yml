services:
  egress-http:
    build:
      context: ./services/egressServices/http
      dockerfile: Dockerfile
    image: minicloud/egress-http:latest
    ports:
      - "8082:8080"

  egress-ftp:
    build:
      context: ./services/egressServices/ftp
      dockerfile: Dockerfile
    image: minicloud/egress-ftp:latest
    ports:
      - "8084:8080"

  egress-ssh:
    build:
      context: ./services/egressServices/ssh
      dockerfile: Dockerfile
    image: minicloud/egress-ssh:latest
    ports:
      - "8085:8080"

  transformers:
    build:
      context: ./services/transformers
      dockerfile: Dockerfile
    image: minicloud/transformers:latest
    ports:
      - "8081:8080"

  orchestrator:
    build:
      context: ./services/orchestrator
      dockerfile: Dockerfile
    image: minicloud/orchestrator:latest
    ports:
      - "8083:8080"
    environment:
      TRANSFORMERS_URL: http://transformers:8080
      EGRESS_HTTP_URL: http://egress-http:8080
      EGRESS_FTP_URL: http://egress-ftp:8080
      EGRESS_SSH_URL: http://egress-ssh:8080
      WORKFLOWS_DIR: /app/workflows
      CONNECTIONS_DIR: /app/connections
      TRACES_DIR: /app/traces
    volumes:
      - ./services/orchestrator/workflows:/app/workflows:ro
      - ./services/orchestrator/connections:/app/connections:ro
      - orchestrator-traces:/app/traces
    depends_on:
      - egress-http
      - egress-ftp
      - egress-ssh
      - transformers

  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    image: minicloud/gateway:latest
    ports:
      - "8080:8080"
    environment:
      TRANSFORMERS_URL: http://transformers:8080
      ORCHESTRATOR_URL: http://orchestrator:8080
      EGRESS_HTTP_URL: http://egress-http:8080
      EGRESS_FTP_URL: http://egress-ftp:8080
      EGRESS_SSH_URL: http://egress-ssh:8080
    depends_on:
      - transformers
      - orchestrator
      - egress-http
      - egress-ftp
      - egress-ssh

  dashboard:
    build:
      context: ./services/dashboard
      dockerfile: Dockerfile
    image: minicloud/dashboard:latest
    ports:
      - "8090:8080"
    environment:
      ORCHESTRATOR_URL: http://orchestrator:8080
    depends_on:
      - orchestrator

volumes:
  orchestrator-traces:
