name: loop_demo
group: Demo
invocation:
  allow_http: true
  allow_schedule: true

example_payloads:
  - name: multi-person
    payload:
      xml: |
        <items>
          <item>Alice</item>
          <item>Bob</item>
          <item>Charlie</item>
        </items>
  - name: single-item
    payload:
      xml: |
        <items>
          <item>Eve</item>
        </items>

# Demonstratie van for_each en repeat_until.
# Input (POST /v1/run/loop_demo):
#   {"xml": "<items><item>Alice</item><item>Bob</item><item>Charlie</item></items>"}
#
# Flow:
#   1. XML → JSON (xml2json)
#   2. for_each over items → Liquid greeting per item
#   3. Liquid join van de resultaten

steps:
  # 1. XML naar JSON
  - id: to_json
    type: xml2json
    input_from: initial

  # 2. Haal de items op als array
  - id: extract_items
    type: context_extract_json
    variable: items_json
    input_from: to_json
    json_path: /items/item

  # 3. Itereer over elk item en maak een groet
  - id: greet_all
    type: for_each
    input_from: "var:items_json"
    items_path: /
    as: person
    index_as: idx
    steps:
      - id: make_ctx
        type: json_set
        input_from: initial
        json_path: /name
        value_from: "var:person"
      - id: greet
        type: liquid
        input_from: make_ctx
        template: "Hello, {{ name }}!"

  # 4. Combineer de resultaten
  - id: combine
    type: liquid
    input_from: greet_all
    template: "Greetings: {% for g in greetings %}{{ g }}{% unless forloop.last %}, {% endunless %}{% endfor %}"
