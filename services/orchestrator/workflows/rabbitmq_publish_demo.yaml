# Demo workflow: publish incoming payload to RabbitMQ with fixed business properties.
# Trigger from dashboard via HTTP run.
name: rabbitmq_publish_demo
group: Integration
invocation:
  allow_http: true
  allow_schedule: true

example_payloads:
  - name: test-message
    payload:
      xml: |
        <message>
          <type>test</type>
          <timestamp>2024-01-01T12:00:00Z</timestamp>
          <content>Hello RabbitMQ</content>
        </message>
  - name: event-notification
    payload:
      xml: |
        <event>
          <source>system</source>
          <severity>info</severity>
          <description>Workflow event notification</description>
        </event>
steps:
  - id: publish_test_message
    type: rabbitmq_publish
    connection: rabbitmq_events
    rabbitmq:
      message_from: initial
      routing_key: test.messageservice.publish.0.1
      properties:
        Domain: Test
        Service: MessageService
        Action: Publish
        Version: "0.1"
