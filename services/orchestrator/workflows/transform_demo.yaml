# xml → JSON (xml2json) → Liquid met JSON-context
name: transform_demo
group: Integration
invocation:
  allow_http: true
  allow_schedule: true
example_payloads:
  - name: trace-test-transform-demo
    payload:
      xml: "<greet><name>MiniCloud</name></greet>"
steps:
  - id: as_json
    type: xml2json
    input_from: initial
  - id: greet
    type: liquid
    input_from: as_json
    template: "Hello, {{ greeting.name }}!"
